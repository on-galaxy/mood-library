<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mood library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=DM+Mono:wght@300&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf8; --surface: #ffffff; --border: rgba(0,0,0,0.1);
    --border-soft: rgba(0,0,0,0.06); --text: #1a1a1a; --muted: #888;
  }
  body { font-family: 'DM Sans', sans-serif; font-weight: 300; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,248,0.92); backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px;
  }
  .logo { font-family: 'DM Mono', monospace; font-weight: 300; font-size: 13px; letter-spacing: 0.05em; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .count { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.03em; }
  .upload-btn {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 12px;
    padding: 7px 18px; border: 0.5px solid var(--border); background: transparent;
    color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .upload-btn:hover { background: var(--text); color: var(--bg); }

  .tag-bar {
    padding: 14px 32px; border-bottom: 0.5px solid var(--border-soft);
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .tag {
    font-family: 'DM Mono', monospace; font-weight: 300; font-size: 11px;
    padding: 5px 14px; border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; letter-spacing: 0.04em;
  }
  .tag:hover { color: var(--text); border-color: rgba(0,0,0,0.2); }
  .tag.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .search-bar { padding: 12px 32px; border-bottom: 0.5px solid var(--border-soft); }
  .search-input {
    width: 100%; font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 13px;
    padding: 0; border: none; background: transparent; color: var(--text); outline: none;
  }
  .search-input::placeholder { color: var(--muted); }

  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .card {
    position: relative; aspect-ratio: 1; overflow: hidden;
    border-right: 0.5px solid var(--border-soft); border-bottom: 0.5px solid var(--border-soft);
    cursor: pointer; background: var(--surface);
  }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s ease; }
  .card:hover img { transform: scale(1.03); }
  .card-info {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 32px 14px 14px;
    background: linear-gradient(transparent, rgba(250,250,248,0.96));
    opacity: 0; transition: opacity 0.2s ease;
  }
  .card:hover .card-info { opacity: 1; }
  .card-mood { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 3px; }
  .card-title { font-size: 12px; font-weight: 400; color: var(--text); }

  .empty { grid-column: 1 / -1; padding: 80px 32px; text-align: center; }
  .empty-title { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.04em; }
  .empty-sub { font-size: 13px; color: rgba(0,0,0,0.3); }

  /* MODALS */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(250,250,248,0.9); backdrop-filter: blur(8px);
    z-index: 200; align-items: center; justify-content: center; padding: 32px;
  }
  .overlay.open { display: flex; }

  /* IMAGE DETAIL MODAL */
  .modal {
    background: var(--surface); border: 0.5px solid var(--border);
    max-width: 760px; width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-img-wrap { flex: 1; min-height: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; }
  .modal-img-wrap img { max-width: 100%; max-height: 60vh; object-fit: contain; display: block; }
  .modal-footer {
    border-top: 0.5px solid var(--border-soft); padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-mood { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 4px; }
  .modal-title { font-size: 14px; font-weight: 400; }
  .modal-actions { display: flex; gap: 12px; align-items: center; }
  .modal-btn {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 11px;
    padding: 6px 16px; border: 0.5px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .modal-btn.danger:hover { color: #c0392b; border-color: #c0392b; }
  .modal-close {
    font-family: 'DM Mono', monospace; font-size: 18px; background: none; border: none;
    color: var(--muted); cursor: pointer; line-height: 1;
  }

  /* UPLOAD MODAL */
  .upload-box {
    background: var(--surface); border: 0.5px solid var(--border);
    width: 100%; max-width: 480px; padding: 32px; max-height: 90vh; overflow-y: auto;
  }
  .upload-box h2 { font-family: 'DM Mono', monospace; font-weight: 300; font-size: 12px; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 24px; }

  .drop-zone {
    border: 0.5px dashed var(--border); padding: 40px; text-align: center;
    cursor: pointer; transition: border-color 0.15s; margin-bottom: 20px;
  }
  .drop-zone:hover { border-color: rgba(0,0,0,0.3); }
  .drop-zone.drag-over { border-color: var(--text); background: rgba(0,0,0,0.02); }
  .drop-label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .drop-sub { font-size: 11px; color: rgba(0,0,0,0.3); }

  .preview-img { width: 100%; height: 120px; object-fit: cover; display: none; margin-bottom: 16px; border: 0.5px solid var(--border-soft); }

  .field-group { margin-bottom: 16px; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  .field-input {
    width: 100%; font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 13px;
    padding: 9px 12px; border: 0.5px solid var(--border); background: var(--bg);
    color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .field-input:focus { border-color: rgba(0,0,0,0.3); }

  /* AI TAGS */
  .ai-section { margin-bottom: 16px; }
  .ai-status {
    font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 0.04em; margin-bottom: 10px; min-height: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .ai-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ai-tag {
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 5px 14px; border: 0.5px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; user-select: none;
  }
  .ai-tag.selected { background: var(--text); color: var(--bg); border-color: var(--text); }
  .ai-tag.is-new { border-style: dashed; }
  .new-badge { font-size: 9px; opacity: 0.5; margin-left: 2px; }

  /* manual tag input shown when AI hasn't responded yet */
  .manual-wrap { display: none; }
  .manual-wrap.visible { display: block; }

  .upload-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 12px;
    padding: 8px 20px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer;
  }
  .btn-save {
    font-family: 'DM Sans', sans-serif; font-weight: 300; font-size: 12px;
    padding: 8px 20px; border: none; background: var(--text); color: var(--bg); cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }

  /* PENDING BANNER */
  .pending-banner {
    display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.04em;
    padding: 10px 24px; z-index: 300; white-space: nowrap;
  }
  .pending-banner.show { display: block; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <span class="logo">mood library</span>
  <div class="header-right">
    <span class="count" id="count-label">0 images</span>
    <button class="upload-btn" onclick="openUpload()">+ upload</button>
  </div>
</header>

<div class="tag-bar" id="tag-bar">
  <span class="tag active" data-tag="all" onclick="filterTag(this)">all</span>
</div>

<div class="search-bar">
  <input class="search-input" type="text" placeholder="search by title or mood..." id="search-input" oninput="renderGallery()" />
</div>

<div class="gallery" id="gallery"></div>

<!-- IMAGE DETAIL MODAL -->
<div class="overlay" id="img-modal" onclick="closeImgModal(event)">
  <div class="modal">
    <div class="modal-img-wrap"><img id="modal-img" src="" alt="" /></div>
    <div class="modal-footer">
      <div>
        <div class="modal-mood" id="modal-mood"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn danger" onclick="deleteImage()">delete</button>
        <button class="modal-close" onclick="document.getElementById('img-modal').classList.remove('open')">×</button>
      </div>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="overlay" id="upload-modal" onclick="closeUploadModal(event)">
  <div class="upload-box">
    <h2>upload image</h2>
    <img class="preview-img" id="preview-img" />
    <div class="drop-zone" id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <span class="drop-label">drop image here or click to browse</span>
      <span class="drop-sub">jpg, png, webp, gif</span>
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="fileSelected(event)" />

    <div class="field-group">
      <label class="field-label">title</label>
      <input class="field-input" type="text" id="img-title" placeholder="untitled" />
    </div>

    <div class="ai-section">
      <label class="field-label">mood — ai suggested</label>
      <div class="ai-status" id="ai-status"></div>
      <div class="ai-tags" id="ai-tags"></div>
      <div class="manual-wrap" id="manual-wrap">
        <input class="field-input" id="manual-tags" type="text" placeholder="e.g. dreamy, dark, tender" style="font-size:12px;" />
      </div>
    </div>

    <div class="upload-actions">
      <button class="btn-cancel" onclick="closeUpload()">cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveImage()" disabled>save</button>
    </div>
  </div>
</div>

<!-- PENDING ANALYSIS BANNER -->
<div class="pending-banner" id="pending-banner">waiting for ai analysis... paste tags when ready</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let images = [], currentFilter = 'all', currentIndex = null, pendingDataUrl = null, allTags = [];
let pendingImageData = null; // { dataUrl, title } waiting for AI response

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function loadData() {
  try {
    const p = JSON.parse(localStorage.getItem('moodlibrary_v3') || '{}');
    images = p.images || []; allTags = p.tags || [];
  } catch(e) { images = []; allTags = []; }
}
function saveData() {
  try { localStorage.setItem('moodlibrary_v3', JSON.stringify({ images, tags: allTags })); } catch(e) {}
}
function addTags(tags) { tags.forEach(t => { if (t && !allTags.includes(t)) allTags.push(t); }); }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function updateCount() {
  const n = images.length;
  document.getElementById('count-label').textContent = n + (n === 1 ? ' image' : ' images');
}

function renderTagBar() {
  const bar = document.getElementById('tag-bar');
  bar.innerHTML = `<span class="tag ${currentFilter==='all'?'active':''}" data-tag="all" onclick="filterTag(this)">all</span>`;
  [...allTags].sort().forEach(t => {
    bar.innerHTML += `<span class="tag ${currentFilter===t?'active':''}" data-tag="${t}" onclick="filterTag(this)">${t}</span>`;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = images.filter(img => {
    const matchTag = currentFilter === 'all' || img.tags.includes(currentFilter);
    const matchSearch = !q || img.title.toLowerCase().includes(q) || img.tags.some(t => t.includes(q));
    return matchTag && matchSearch;
  });
  if (!filtered.length) {
    gallery.innerHTML = '<div class="empty"><div class="empty-title">no images yet</div><div class="empty-sub">upload your first image to get started</div></div>';
    return;
  }
  gallery.innerHTML = filtered.map(img => {
    const i = images.indexOf(img);
    return `<div class="card" onclick="openModal(${i})">
      <img src="${img.src}" alt="${img.title}" loading="lazy" />
      <div class="card-info">
        <div class="card-mood">${img.tags.join(' · ')}</div>
        <div class="card-title">${img.title || 'untitled'}</div>
      </div>
    </div>`;
  }).join('');
}

function filterTag(el) {
  document.querySelectorAll('#tag-bar .tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); currentFilter = el.dataset.tag; renderGallery();
}

// ─── IMAGE MODAL ─────────────────────────────────────────────────────────────
function openModal(i) {
  currentIndex = i; const img = images[i];
  document.getElementById('modal-img').src = img.src;
  document.getElementById('modal-title').textContent = img.title || 'untitled';
  document.getElementById('modal-mood').textContent = img.tags.join(' · ');
  document.getElementById('img-modal').classList.add('open');
}
function closeImgModal(e) { if (e.target.id === 'img-modal') document.getElementById('img-modal').classList.remove('open'); }

function deleteImage() {
  if (currentIndex === null || !confirm('Delete this image?')) return;
  images.splice(currentIndex, 1);
  const used = new Set(images.flatMap(i => i.tags));
  allTags = allTags.filter(t => used.has(t));
  saveData(); updateCount(); renderTagBar(); renderGallery();
  document.getElementById('img-modal').classList.remove('open');
}

// ─── UPLOAD MODAL ────────────────────────────────────────────────────────────
function openUpload() {
  pendingDataUrl = null;
  document.getElementById('img-title').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('ai-tags').innerHTML = '';
  document.getElementById('ai-status').innerHTML = '';
  document.getElementById('manual-wrap').classList.remove('visible');
  document.getElementById('btn-save').disabled = true;
  document.getElementById('upload-modal').classList.add('open');
}
function closeUpload() { document.getElementById('upload-modal').classList.remove('open'); pendingDataUrl = null; }
function closeUploadModal(e) { if (e.target.id === 'upload-modal') closeUpload(); }

function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function dragLeave() { document.getElementById('drop-zone').classList.remove('drag-over'); }
function dropFile(e) { e.preventDefault(); dragLeave(); const f = e.dataTransfer.files[0]; if (f?.type.startsWith('image/')) readFile(f); }
function fileSelected(e) { const f = e.target.files[0]; if (f) readFile(f); }

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    pendingDataUrl = e.target.result;
    document.getElementById('preview-img').src = pendingDataUrl;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('drop-zone').style.display = 'none';
    requestAiTags(pendingDataUrl);
  };
  reader.readAsDataURL(file);
}

// ─── AI TAGGING via Claude API ───────────────────────────────────────────────
async function requestAiTags(dataUrl) {
  const statusEl = document.getElementById('ai-status');
  const tagsEl = document.getElementById('ai-tags');
  const saveBtn = document.getElementById('btn-save');

  statusEl.innerHTML = '<span class="dot"></span> analyzing mood...';
  tagsEl.innerHTML = '';
  saveBtn.disabled = true;

  const base64 = dataUrl.split(',')[1];
  const mime = (dataUrl.match(/data:(image\/[\w+]+);/) || [])[1] || 'image/jpeg';
  const existingHint = allTags.length
    ? `Existing tags in library: ${allTags.join(', ')}. Reuse if fitting, invent new ones if needed.`
    : '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 150,
        system: `You are a mood curator for an AI image archive called "mood library".
Look at the image and return 2–5 single-word mood tags that capture its emotional atmosphere and aesthetic feeling.
Tags must be evocative and poetic — like: dreamy, liminal, tender, raw, cinematic, glitchy, ethereal, nostalgic, surreal, hypnotic, serene, vivid, dark, minimal, hollow, lush, fever, haze, gossamer, bruised.
Never use generic words like beautiful, colorful, artistic, nice.
${existingHint}
Reply ONLY with a JSON array of lowercase strings. Example: ["dreamy","liminal","tender"]`,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
            { type: 'text', text: 'Mood tags for this image?' }
          ]
        }]
      })
    });

    const data = await res.json();
    const raw = data.content?.[0]?.text || '[]';
    const tags = JSON.parse(raw.replace(/```json|```/g, '').trim());

    showAiTags(tags);

  } catch(err) {
    // Fallback: show manual input
    statusEl.innerHTML = 'could not auto-analyze — add tags manually';
    document.getElementById('manual-wrap').classList.add('visible');
    saveBtn.disabled = false;
  }
}

function showAiTags(tags) {
  const statusEl = document.getElementById('ai-status');
  const tagsEl = document.getElementById('ai-tags');
  statusEl.innerHTML = 'ai suggested — tap to deselect';
  tagsEl.innerHTML = tags.map(tag => {
    const isNew = !allTags.includes(tag);
    return `<span class="ai-tag selected${isNew?' is-new':''}" data-tag="${tag}" onclick="this.classList.toggle('selected')">
      ${tag}${isNew?'<span class="new-badge">new</span>':''}
    </span>`;
  }).join('');
  document.getElementById('btn-save').disabled = false;
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
function saveImage() {
  if (!pendingDataUrl) return;
  const title = document.getElementById('img-title').value.trim();
  let tags = Array.from(document.querySelectorAll('.ai-tag.selected')).map(t => t.dataset.tag);
  if (!tags.length) {
    const manual = document.getElementById('manual-tags');
    if (manual?.value) tags = manual.value.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
  }
  if (!tags.length) tags = ['untagged'];
  addTags(tags);
  images.unshift({ src: pendingDataUrl, title: title || 'untitled', tags });
  saveData(); updateCount(); renderTagBar(); renderGallery(); closeUpload();
}

// ─── EXTERNAL TAG INJECTION (for Claude.ai context) ──────────────────────────
// If running inside Claude.ai where direct API calls are blocked,
// Claude can inject tags by calling window.injectMoodTags(["tag1","tag2"])
window.injectMoodTags = function(tags) {
  if (!Array.isArray(tags)) return;
  showAiTags(tags);
  document.getElementById('pending-banner').classList.remove('show');
};

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData(); updateCount(); renderTagBar(); renderGallery();
</script>
</body>
</html>
